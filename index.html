            carouselList.forEach((src, index) => {

                dotsHtml += `<span class="dot ${index === 0 ? 'active-dot' : ''}" data-slide="${index}"></span>`;

            const slides = document.querySelectorAll('.carousel-slide');
            const prev = document.querySelector('.prev');
            const next = document.querySelector('.next');
            const dots = document.querySelectorAll('.dot');
            let currentSlide = 0;

            function showSlide(index) {
                if (index >= slides.length) index = 0;
                if (index < 0) index = slides.length - 1;
                slides.forEach(s => s.classList.remove('active'));
                slides[index].classList.add('active');
                dots.forEach(d => d.classList.remove('active-dot'));
                dots[index].classList.add('active-dot');
                currentSlide = index;
            }

            prev.addEventListener('click', () => showSlide(currentSlide - 1));
            next.addEventListener('click', () => showSlide(currentSlide + 1));
            dots.forEach((dot, i) => dot.addEventListener('click', () => showSlide(i)));

            // -------------------------------------------------------------
            // PAGINACIÓN
            // -------------------------------------------------------------
            function createPagination(gridId, items, itemsPerPage = 50) {
                const grid = document.getElementById(gridId);
                const prevBtn = document.getElementById(gridId.replace('-grid', '-prev'));
                const nextBtn = document.getElementById(gridId.replace('-grid', '-next'));
                const pageInfo = document.getElementById(gridId.replace('-grid', '-page-info'));
                let currentPage = 1;
                const totalPages = Math.ceil(items.length / itemsPerPage);

                function renderPage() {
                    const start = (currentPage - 1) * itemsPerPage;
                    const end = start + itemsPerPage;
                    const pageItems = items.slice(start, end);

                    let html = '';
                    pageItems.forEach(file => {
                        html += `
                            <div class="grid-item" data-src="${file}" data-type="image">
                                <img src="${file}" alt="" loading="lazy">
                            </div>
                        `;
                    });
                    grid.innerHTML = html;
                    pageInfo.textContent = `Página ${currentPage} / ${totalPages}`;
                    prevBtn.disabled = currentPage === 1;
                    nextBtn.disabled = currentPage === totalPages;
                }

                prevBtn.addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        renderPage();
                        window.scrollTo({ top: grid.offsetTop - 100, behavior: 'smooth' });
                    }
                });

                nextBtn.addEventListener('click', () => {
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderPage();
                        window.scrollTo({ top: grid.offsetTop - 100, behavior: 'smooth' });
                    }
                });

                renderPage();

            // -------------------------------------------------------------
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            const modalDownload = document.getElementById('modal-download');
            const closeBtn = document.querySelector('.close');
            let currentSrc = '';

            function openModal(src) {
                currentSrc = src;
                modal.style.display = 'block';
                modalImg.src = currentSrc;
            }

            // Delegación de eventos para la grid
            document.body.addEventListener('click', (e) => {
                const item = e.target.closest('.grid-item');
                if (!item) return;
                const src = item.dataset.src;
                openModal(src);
            });

            modalDownload.addEventListener('click', () => {
                if (currentSrc) {
                    const a = document.createElement('a');
                    a.href = currentSrc;
                    a.download = currentSrc.split('/').pop();
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            });

            closeBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });

            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
